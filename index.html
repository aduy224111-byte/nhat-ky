<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔮 MoodDiary - Mạng Xã Hội Nhật Ký</title>
    <!-- Nhúng Font chữ Google Serif hiện đại -->
    <link href="https://googleapis.com" rel="stylesheet">
    
    <style>
        .hidden { display: none !important; }
        
        body {
            background: linear-gradient(135deg, #e0e7ff 0%, #f3e8ff 50%, #fce7f3 100%) !important;
            background-color: #f3e8ff !important;
            font-family: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
        }

        /* Khung Đăng ký / Đăng nhập Xịn 1000% */
        .card-auth {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 3rem 2.5rem;
            border-radius: 2rem;
            width: 90%;
            max-w: 420px;
            margin: auto;
            box-shadow: 0 25px 60px -15px rgba(124, 58, 237, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.7);
            text-align: center;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        .card-auth:hover {
            transform: translateY(-5px);
            box-shadow: 0 30px 70px -10px rgba(124, 58, 237, 0.25);
        }

        .title-gradient {
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(to right, #7c3aed, #db2777);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0.5rem 0;
            letter-spacing: -0.5px;
        }

        .label-style {
            display: block;
            font-weight: 700;
            font-size: 0.85rem;
            color: #4b5563;
            margin-bottom: 0.5rem;
            text-align: left;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-style {
            width: 100%;
            padding: 0.9rem 1.25rem;
            border: 2px solid #e2e8f0;
            border-radius: 1rem;
            margin-bottom: 1.5rem;
            box-sizing: border-box;
            outline: none;
            font-size: 1rem;
            font-weight: 500;
            color: #1f2937;
            transition: all 0.2s ease;
            background-color: #f8fafc;
        }

        .input-style:focus {
            border-color: #a855f7;
            background-color: #ffffff;
            box-shadow: 0 0 0 4px rgba(168, 85, 247, 0.15);
        }

        .btn-primary {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #7c3aed 0%, #4f46e5 100%) !important;
            color: white !important;
            border: none;
            border-radius: 1rem;
            font-weight: 800;
            font-size: 1.05rem;
            cursor: pointer;
            box-shadow: 0 10px 20px -5px rgba(124, 58, 237, 0.4);
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 25px -5px rgba(124, 58, 237, 0.5);
            opacity: 0.95;
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .text-link {
            color: #7c3aed;
            font-weight: 700;
            background: none;
            border: none;
            cursor: pointer;
            text-decoration: none;
            transition: color 0.2s;
        }

        .text-link:hover {
            color: #db2777;
            text-decoration: underline;
        }

        /* Giao diện chính sau khi đăng nhập thành công */
        .dashboard-container {
            width: 100%;
            min-height: 100vh;
            background-color: #f8fafc;
            display: flex;
            flex-direction: column;
            align-items: stretch;
            justify-content: flex-start;
        }

        nav {
            background: white;
            padding: 1.25rem 2.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.03);
            border-b: 1px solid #e2e8f0;
        }

        .main-content {
            max-width: 760px;
            width: 100%;
            margin: 2.5rem auto;
            padding: 0 1.25rem;
            box-sizing: border-box;
        }

        .form-diary {
            background: white;
            padding: 2rem;
            border-radius: 1.5rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.02);
            border: 1px solid #e2e8f0;
            margin-bottom: 2.5rem;
        }

        .diary-card {
            background: white;
            padding: 1.75rem;
            border-radius: 1.5rem;
            border: 1px solid #e2e8f0;
            margin-bottom: 1.25rem;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.01);
            transition: transform 0.2s ease;
        }

        .diary-card:hover {
            transform: translateY(-2px);
        }

        .btn-like {
            background: #fff5f5;
            color: #f43f5e;
            border: 1px solid #ffe4e6;
            padding: 0.6rem 1.25rem;
            border-radius: 0.75rem;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.35rem;
            transition: all 0.2s;
        }

        .btn-like:hover {
            background: #ffe4e6;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <!-- 🔑 GIAO DIỆN ĐĂNG NHẬP CHUẨN XỊN -->
    <div id="loginPage" style="width: 100%;">
        <div class="card-auth">
            <div style="margin-bottom: 2.5rem;">
                <span style="font-size: 3.5rem; display: block; margin-bottom: 0.5rem;">🔮</span>
                <h2 class="title-gradient">MoodDiary</h2>
                <p style="color: #6b7280; font-size: 0.95rem; font-weight: 500; margin: 0;">Đăng nhập tài khoản mạng xã hội nhật ký</p>
            </div>
            <!-- SỬA LỖI GẮN HÀM XỬ LÝ CHO FORM -->
            <form onsubmit="handleLoginSubmit(event)">
                <label class="label-style">Tên tài khoản</label>
                <input type="text" id="loginUser" required placeholder="Nhập tên tài khoản của bạn..." class="input-style">
                
                <label class="label-style">Mật khẩu</label>
                <input type="password" id="loginPass" required placeholder="••••••••" class="input-style">
                
                <button type="submit" class="btn-primary">Đăng Nhập Ngay</button>
            </form>
            <p style="margin-top: 2rem; font-size: 0.9rem; font-weight: 500; color: #4b5563;">Chưa có tài khoản? <button onclick="switchPage('registerPage')" class="text-link">Đăng ký tài khoản mới</button></p>
        </div>
    </div>

    <!-- 📝 GIAO DIỆN ĐĂNG KÝ CHUẨN XỊN (ĐÃ SỬA LỖI NÚT BẤM) -->
    <div id="registerPage" class="hidden" style="width: 100%;">
        <div class="card-auth">
            <div style="margin-bottom: 2.5rem;">
                <span style="font-size: 3.5rem; display: block; margin-bottom: 0.5rem;">📝</span>
                <h2 class="title-gradient">Tạo Tài Khoản</h2>
                <p style="color: #6b7280; font-size: 0.95rem; font-weight: 500; margin: 0;">Đăng ký để kết nối cảm xúc cùng mọi người</p>
            </div>
            <!-- FIX CHÍNH XÁC SỰ KIỆN FORM TẠI ĐÂY -->
            <form onsubmit="handleRegisterSubmit(event)">
                <label class="label-style">Tên tài khoản mới</label>
                <input type="text" id="regUser" required placeholder="Nhập tên viết liền không dấu..." class="input-style">
                
                <label class="label-style">Mật khẩu bảo mật</label>
                <input type="password" id="regPass" required placeholder="Tối thiểu 6 ký tự..." class="input-style">
                
                <button type="submit" class="btn-primary">Đăng Ký Tài Khoản</button>
            </form>
            <p style="margin-top: 2rem; font-size: 0.9rem; font-weight: 500; color: #4b5563;">Đã có tài khoản? <button onclick="switchPage('loginPage')" class="text-link">Quay lại đăng nhập</button></p>
        </div>
    </div>

    <!-- 🔮 BẢNG ĐIỀU KHIỂN CHÍNH (DASHBOARD) -->
    <div id="dashboardPage" class="hidden dashboard-container">
        <nav>
            <div style="display: flex; align-items: center; gap: 0.5rem;"><span style="font-size: 1.75rem;">🔮</span><span style="font-weight: 900; font-size: 1.4rem; color: #7c3aed; letter-spacing: -0.5px;">MoodDiary</span></div>
            <div style="display: flex; gap: 1.25rem; align-items: center;">
                <p id="displayUsername" style="font-weight: 700; color: #1e293b; margin: 0; background: #f1f5f9; padding: 0.5rem 1rem; border-radius: 9999px;">@user</p>
                <button onclick="handleLogout()" style="background: #fef2f2; color: #ef4444; border: none; padding: 0.6rem 1.25rem; border-radius: 0.75rem; font-weight: 700; font-size: 0.9rem; cursor: pointer; transition: all 0.2s;">Đăng xuất</button>
            </div>
        </nav>

        <main class="main-content">
            <!-- Form Viết Bài -->
            <div class="form-diary">
                <h3 style="margin-top: 0; font-size: 1.3rem; font-weight: 800; color: #1e293b; margin-bottom: 1.25rem;">✍️ Hôm nay tâm trạng của bạn thế nào?</h3>
                <form onsubmit="handleCabinetSubmit(event)" style="display: flex; flex-direction: column; gap: 1.25rem;">
                    <input type="text" id="diaryTitle" placeholder="Tiêu đề câu chuyện ngày hôm nay..." required style="padding: 0.85rem 1rem; border: 2px solid #e2e8f0; border-radius: 0.75rem; outline: none; font-size: 1rem; font-weight: 500; transition: border 0.2s;" onfocus="this.style.borderColor='#a855f7'" onblur="this.style.borderColor='#e2e8f0'">
                    <textarea id="diaryContent" rows="4" placeholder="Hãy lan tỏa câu chuyện hoặc trút bỏ những tâm sự của bạn vào đây nào..." required style="padding: 0.85rem 1rem; border: 2px solid #e2e8f0; border-radius: 0.75rem; outline: none; font-size: 1rem; font-weight: 500; resize: vertical; font-family: inherit; transition: border 0.2s;" onfocus="this.style.borderColor='#a855f7'" onblur="this.style.borderColor='#e2e8f0'"></textarea>
                    <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem;">
                        <div style="display: flex; align-items: center; gap: 0.5rem;">
                            <span style="font-size: 0.9rem; font-weight: 700; color: #4b5563;">Chọn Mood:</span>
                            <select id="diaryMood" style="padding: 0.6rem 1rem; border-radius: 0.75rem; border: 2px solid #e2e8f0; background: #f8fafc; font-size: 0.95rem; font-weight: 600; outline: none;">
                                <option>🚀 Tuyệt vời</option><option>🙂 Vui vẻ</option><option>😐 Bình thường</option><option>😢 Buồn bã</option><option>😡 Bực bội</option>
                            </select>
                        </div>
                        <button type="submit" style="padding: 0.85rem 2rem; background: linear-gradient(135deg, #7c3aed 0%, #6366f1 100%); color: white; border: none; border-radius: 0.75rem; font-weight: 800; cursor: pointer; box-shadow: 0 4px 12px rgba(124, 58, 237, 0.3);">Chia Sẻ Lên Cộng Đồng</button>
                    </div>
                </form>
            </div>

            <!-- Bảng Tin Nhật Ký Chung -->
            <div>
                <h3 style="font-size: 1.4rem; font-weight: 800; color: #1e293b; margin-bottom: 1.25rem;">🌐 Bảng tin mạng xã hội thời gian thực</h3>
                <div id="diaryList" style="display: flex; flex-direction: column; gap: 1rem;"></div>
            </div>
        </main>
    </div>

    <!-- ⚡ HỆ THỐNG KẾT NỐI SERVER ĐÁM MÂY TẬP TRUNG -->
    <script>
        const BIN_ID = "65ffb5f0266e066373b9e597";
        const API_KEY = "$2a$10$7V7S/U912p44j7DAt7VdLu/RkO8Wn/z1H03wG.E0O1V73qL7gXJ9G";
        const API_URL = `https://jsonbin.io{BIN_ID}`;

        let currentUser = localStorage.getItem("diary_user") || null;

        function switchPage(pageId) {
            document.getElementById('loginPage').classList.add('hidden');
            document.getElementById('registerPage').classList.add('hidden');
            document.getElementById('dashboardPage').classList.add('hidden');
            
            document.getElementById(pageId).classList.remove('hidden');
            if (pageId === 'dashboardPage') {
                document.getElementById(pageId).style.display = 'block';
                document.body.style.justifyContent = 'flex-start';
            } else {
                document.getElementById(pageId).style.display = 'flex';
                document.body.style.justifyContent = 'center';
            }
        }

        function initApp() {
            if (currentUser) {
                document.getElementById('displayUsername').innerText = "@" + currentUser;
                switchPage('dashboardPage');
                loadDiaries();
            } else {
                switchPage('loginPage');
            }
        }
        window.onload = initApp;

        async function getServerData() {
            try {
                const res = await fetch(API_URL, { headers: { "X-Master-Key": API_KEY } });
                const resData = await res.json();
                return resData.record || { users: {}, diaries: [] };
            } catch (err) {
                return { users: {}, diaries: [] };
            }
        }

        async function updateServerData(newData) {
            await fetch(API_URL, {
                method: "PUT",
                headers: { "Content-Type": "application/json", "X-Master-Key": API_KEY },
                body: JSON.stringify(newData)
            });
        }

        // HÀM XỬ LÝ ĐĂNG KÝ ĐÃ ĐƯỢC FIX HOÀN TOÀN LỖI
        async function handleRegisterSubmit(e) {
            e.preventDefault();
            const user = document.getElementById('regUser').value.trim().toLowerCase();
            const pass = document.getElementById('regPass').value;

            if(!user || !pass) return alert("Vui lòng nhập đầy đủ tài khoản và mật khẩu!");
            if(pass.length < 6) return alert("Mật khẩu phải dài tối thiểu 6 ký tự!");

            alert("Đang kiểm tra và khởi tạo tài khoản trên máy chủ đám mây, vui lòng chờ chút...");
            
            const serverData = await getServerData();
            if (serverData.users && serverData.users[user]) {
                alert("Tên tài khoản này đã có người đăng ký từ trước! Vui lòng chọn tên khác.");
            } else {
                if(!serverData.users) serverData.users = {};
                serverData.users[user] = pass;
                await updateServerData(serverData);
                alert("🎉 Tuyệt vời! Đăng ký tài khoản mạng xã hội thành công vĩnh viễn.");
                switchPage('loginPage');
            }
        }

        // HÀM XỬ LÝ ĐĂNG NHẬP
        async function handleLoginSubmit(e) {
            e.preventDefault();
            const user = document.getElementById('loginUser').value.trim().toLowerCase();
            const pass = document.getElementById('loginPass').value;

            const serverData = await getServerData();
            if (serverData.users && serverData.users[user] && serverData.users[user] === pass) {
                currentUser = user;
                localStorage.setItem("diary_user", user);
                document.getElementById('displayUsername').innerText = "@" + user;
                switchPage('dashboardPage');
                loadDiaries();
            } else {
                alert("❌ Tài khoản không chính xác hoặc sai mật khẩu rồi!");
            }
        }

        // ĐĂNG BÀI VIẾT CHUNG
        async function handleCabinetSubmit(e) {
            e.preventDefault();
            const title = document.getElementById('diaryTitle').value;
            const content = document.getElementById('diaryContent').value;
            const mood = document.getElementById('diaryMood').value;

            const serverData = await getServerData();
            if(!serverData.diaries) serverData.diaries = [];
            
            const newDiary = {
                id: Date.now(),
                title: title,
                content: content,
                mood: mood,
                author: currentUser,
                likes: 0
            };
            
            serverData.diaries.unshift(newDiary);
            await updateServerData(serverData);

            document.getElementById('diaryTitle').value = '';
            document.getElementById('diaryContent').value = '';
            loadDiaries();
        }

        // TẢI TOÀN BỘ BÀI VIẾT THỜI GIAN THỰC
        async function loadDiaries() {
            const list = document.getElementById('diaryList');
            list.innerHTML = '<p style="color: #64748b; text-align: center; font-style: italic; padding: 2rem;">🔄 Đang tải bảng tin thời gian thực...</p>';
            
            const serverData = await getServerData();
            list.innerHTML = '';
            
            if (!serverData.diaries || serverData.diaries.length === 0) {
                list.innerHTML = '<p style="color: #64748b; text-align: center; font-style: italic; padding: 2rem; background: white; border-radius: 1rem;">🌐 Hệ thống chưa có bài chia sẻ nào. Hãy là người mở bát bài viết đầu tiên!</p>';
                return;
            }

            serverData.diaries.forEach(d => {
                let borderStyle = 'border-left: 6px solid #94a3b8;';
                if (d.mood.includes('🚀') || d.mood.includes('🙂')) borderStyle = 'border-left: 6px solid #10b981;';
                if (d.mood.includes('😢') || d.mood.includes('😡')) borderStyle = 'border-left: 6px solid #ef4444;';

                list.innerHTML += `
                    <div class="diary-card" style="${borderStyle}">
                        <div style="display: flex; justify-content: space-between; align-items: start;">
                            <div>
                                <h4 style="font-weight: 800; font-size: 1.25rem; color: #1e293b; margin: 0; letter-spacing:-0.3px;">${d.title}</h4>
                                <p style="font-size: 0.8rem; color: #7c3aed; font-weight:700; margin: 0.25rem 0 0 0;">Viết bởi: <span>@${d.author}</span></p>
                            </div>
                            <span style="background: #f3e8ff; color: #6b21a8; font-size: 0.8rem; padding: 0.35rem 0.85rem; border-radius: 9999px; font-weight: 700;">${d.mood}</span>
                        </div>
                        <p style="color: #475569; line-height: 1.6; margin: 1.25rem 0; white-space: pre-wrap; font-size: 0.975rem; font-weight:500;">${d.content}</p>
                        <div style="margin-top: 1rem; padding-top: 0.75rem; border-top: 1px solid #f1f5f9;">
                            <button onclick="likePost(${d.id})" class="btn-like">
                                <span>❤️</span> Thích (<span>${d.likes || 0}</span>)
                            </button>
                        </div>
                    </div>`;
            });
        }

        // THẢ TIM ĐỒNG BỘ TOÀN MẠNG
        async function likePost(diaryId) {
            if (!currentUser) return alert("Vui lòng đăng nhập!");
            const serverData = await getServerData();
            const diaryIndex = serverData.diaries.findIndex(item => item.id === diaryId);
            if (diaryIndex !== -1) {
                serverData.diaries[diaryIndex].likes = (serverData.diaries[diaryIndex].likes || 0) + 1;
                await updateServerData(serverData);
                loadDiaries();
            }
        }

        function handleLogout() {
            currentUser = null;
            localStorage.removeItem("diary_user");
            switchPage('loginPage');
        }
    </script>
</body>
</html>
