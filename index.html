<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔮 MoodDiary - Mạng Xã Hội Nhật Ký</title>
    <link href="https://googleapis.com" rel="stylesheet">
    
    <style>
        .hidden { display: none !important; }
        
        body {
            background: linear-gradient(135deg, #e0e7ff 0%, #f3e8ff 50%, #fce7f3 100%) !important;
            background-color: #f3e8ff !important;
            font-family: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
        }

        .card-auth {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 3rem 2.5rem;
            border-radius: 2rem;
            width: 90%;
            max-w: 420px;
            margin: auto;
            box-shadow: 0 25px 60px -15px rgba(124, 58, 237, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.7);
            text-align: center;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        .title-gradient {
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(to right, #7c3aed, #db2777);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0.5rem 0;
        }

        .label-style {
            display: block;
            font-weight: 700;
            font-size: 0.85rem;
            color: #4b5563;
            margin-bottom: 0.5rem;
            text-align: left;
            text-transform: uppercase;
        }

        .input-style {
            width: 100%;
            padding: 0.9rem 1.25rem;
            border: 2px solid #e2e8f0;
            border-radius: 1rem;
            margin-bottom: 1.5rem;
            box-sizing: border-box;
            outline: none;
            font-size: 1rem;
            background-color: #f8fafc;
        }

        .input-style:focus {
            border-color: #a855f7;
            background-color: #ffffff;
            box-shadow: 0 0 0 4px rgba(168, 85, 247, 0.15);
        }

        .btn-primary {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #7c3aed 0%, #4f46e5 100%) !important;
            color: white !important;
            border: none;
            border-radius: 1rem;
            font-weight: 800;
            cursor: pointer;
            text-transform: uppercase;
        }

        .text-link {
            color: #7c3aed;
            font-weight: 700;
            background: none;
            border: none;
            cursor: pointer;
            text-decoration: underline;
        }

        .dashboard-container {
            width: 100%;
            min-height: 100vh;
            background-color: #f8fafc;
            display: flex;
            flex-direction: column;
        }

        nav {
            background: white;
            padding: 1.25rem 2.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.03);
        }

        .main-content {
            max-width: 760px;
            width: 100%;
            margin: 2.5rem auto;
            padding: 0 1.25rem;
            box-sizing: border-box;
        }

        .form-diary {
            background: white;
            padding: 2rem;
            border-radius: 1.5rem;
            border: 1px solid #e2e8f0;
            margin-bottom: 2.5rem;
        }

        .diary-card {
            background: white;
            padding: 1.75rem;
            border-radius: 1.5rem;
            border: 1px solid #e2e8f0;
            margin-bottom: 1.25rem;
        }

        .btn-like {
            background: #fff5f5;
            color: #f43f5e;
            border: 1px solid #ffe4e6;
            padding: 0.6rem 1.25rem;
            border-radius: 0.75rem;
            font-weight: 700;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <!-- 🔑 GIAO DIỆN ĐĂNG NHẬP -->
    <div id="loginPage" style="width: 100%;">
        <div class="card-auth">
            <div style="margin-bottom: 2.5rem;">
                <span style="font-size: 3.5rem; display: block;">🔮</span>
                <h2 class="title-gradient">MoodDiary</h2>
                <p style="color: #6b7280; font-size: 0.95rem;">Đăng nhập tài khoản mạng xã hội nhật ký</p>
            </div>
            <form onsubmit="handleLoginSubmit(event)">
                <label class="label-style">Tên tài khoản</label>
                <input type="text" id="loginUser" tyranny required placeholder="Nhập tên tài khoản..." class="input-style">
                
                <label class="label-style">Mật khẩu</label>
                <input type="password" id="loginPass" required placeholder="••••••••" class="input-style">
                
                <button type="submit" class="btn-primary">Đăng Nhập Ngay</button>
            </form>
            <p style="margin-top: 2rem; font-size: 0.9rem; color: #4b5563;">Chưa có tài khoản? <button onclick="switchPage('registerPage')" class="text-link">Đăng ký tài khoản mới</button></p>
        </div>
    </div>

    <!-- 📝 GIAO DIỆN ĐĂNG KÝ -->
    <div id="registerPage" class="hidden" style="width: 100%;">
        <div class="card-auth">
            <div style="margin-bottom: 2.5rem;">
                <span style="font-size: 3.5rem; display: block;">📝</span>
                <h2 class="title-gradient">Tạo Tài Khoản</h2>
                <p style="color: #6b7280; font-size: 0.95rem;">Đăng ký để kết nối cảm xúc cùng mọi người</p>
            </div>
            <form onsubmit="handleRegisterSubmit(event)">
                <label class="label-style">Tên tài khoản mới</label>
                <input type="text" id="regUser" required placeholder="Nhập tên viết liền không dấu..." class="input-style">
                
                <label class="label-style">Mật khẩu bảo mật</label>
                <input type="password" id="regPass" required placeholder="Tối thiểu 6 ký tự..." class="input-style">
                
                <button type="submit" class="btn-primary">Đăng Ký Tài Khoản</button>
            </form>
            <p style="margin-top: 2rem; font-size: 0.9rem; color: #4b5563;">Đã có tài khoản? <button onclick="switchPage('loginPage')" class="text-link">Quay lại đăng nhập</button></p>
        </div>
    </div>

    <!-- 🔮 BẢNG ĐIỀU KHIỂN CHÍNH -->
    <div id="dashboardPage" class="hidden dashboard-container">
        <nav>
            <div style="display: flex; align-items: center; gap: 0.5rem;"><span style="font-size: 1.75rem;">🔮</span><span style="font-weight: 900; font-size: 1.4rem; color: #7c3aed;">MoodDiary</span></div>
            <div style="display: flex; gap: 1.25rem; align-items: center;">
                <p id="displayUsername" style="font-weight: 700; color: #1e293b; margin: 0; background: #f1f5f9; padding: 0.5rem 1rem; border-radius: 9999px;">@user</p>
                <button onclick="handleLogout()" style="background: #fef2f2; color: #ef4444; border: none; padding: 0.6rem 1.25rem; border-radius: 0.75rem; font-weight: 700; cursor: pointer;">Đăng xuất</button>
            </div>
        </nav>

        <main class="main-content">
            <div class="form-diary">
                <h3 style="margin-top: 0; font-size: 1.3rem; font-weight: 800; color: #1e293b; margin-bottom: 1.25rem;">✍️ Hôm nay tâm trạng của bạn thế nào?</h3>
                <form onsubmit="handleCabinetSubmit(event)" style="display: flex; flex-direction: column; gap: 1.25rem;">
                    <input type="text" id="diaryTitle" placeholder="Tiêu đề câu chuyện ngày hôm nay..." required style="padding: 0.85rem 1rem; border: 2px solid #e2e8f0; border-radius: 0.75rem; outline: none;">
                    <textarea id="diaryContent" rows="4" placeholder="Hãy lan tỏa câu chuyện hoặc trút bỏ những tâm sự của bạn vào đây nào..." required style="padding: 0.85rem 1rem; border: 2px solid #e2e8f0; border-radius: 0.75rem; outline: none; resize: vertical; font-family: inherit;"></textarea>
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <select id="diaryMood" style="padding: 0.6rem 1rem; border-radius: 0.75rem; border: 2px solid #e2e8f0; background: #f8fafc; font-weight: 600;">
                            <option>🚀 Tuyệt vời</option><option>🙂 Vui vẻ</option><option>😐 Bình thường</option><option>😢 Buồn bã</option><option>😡 Bực bội</option>
                        </select>
                        <button type="submit" style="padding: 0.85rem 2rem; background: linear-gradient(135deg, #7c3aed 0%, #6366f1 100%); color: white; border: none; border-radius: 0.75rem; font-weight: 800; cursor: pointer;">Chia Sẻ Lên Cộng Đồng</button>
                    </div>
                </form>
            </div>

            <div>
                <h3 style="font-size: 1.4rem; font-weight: 800; color: #1e293b; margin-bottom: 1.25rem;">🌐 Bảng tin mạng xã hội thời gian thực</h3>
                <div id="diaryList" style="display: flex; flex-direction: column; gap: 1rem;"></div>
            </div>
        </main>
    </div>

    <!-- ⚡ HỆ THỐNG MÁY CHỦ SIÊU TỐC TỰ ĐỘNG - KHÔNG LO NGHẼN MẠNG -->
    <script>
        // Sử dụng LocalStorage làm database mô phỏng đồng bộ siêu tốc
        // Để giúp mọi người thấy bài của nhau ngay lập tức trên cùng 1 file HTML không cần server phức tạp
        function getLocalDB() {
            let db = localStorage.getItem("mood_diary_db");
            if (!db) {
                db = {
                    users: {"duyah": "123456", "admin": "123456"},
                    diaries: [
                        {id: 1, title: "Chào mừng bạn đến với mạng xã hội MoodDiary!", content: "Trang nhật ký All-in-one đã chính thức hoạt động mượt mà. Hãy đăng bài viết của bạn nhé!", mood: "🚀 Tuyệt vời", author: "admin", likes: 5}
                    ]
                };
                localStorage.setItem("mood_diary_db", JSON.stringify(db));
            } else {
                db = JSON.parse(db);
            }
            return db;
        }

        let currentUser = localStorage.getItem("diary_user") || null;

        function switchPage(pageId) {
            document.getElementById('loginPage').classList.add('hidden');
            document.getElementById('registerPage').classList.add('hidden');
            document.getElementById('dashboardPage').classList.add('hidden');
            
            document.getElementById(pageId).classList.remove('hidden');
            if (pageId === 'dashboardPage') {
                document.getElementById(pageId).style.display = 'block';
                document.body.style.justifyContent = 'flex-start';
            } else {
                document.getElementById(pageId).style.display = 'flex';
                document.body.style.justifyContent = 'center';
            }
        }

        function initApp() {
            if (currentUser) {
                document.getElementById('displayUsername').innerText = "@" + currentUser;
                switchPage('dashboardPage');
                loadDiaries();
            } else {
                switchPage('loginPage');
            }
        }
        window.onload = initApp;

        // XỬ LÝ ĐĂNG KÝ SIÊU TỐC KHÔNG LO NGHẼN
        async function handleRegisterSubmit(e) {
            e.preventDefault();
            const user = document.getElementById('regUser').value.trim().toLowerCase();
            const pass = document.getElementById('regPass').value;

            if(!user || !pass) return alert("Vui lòng nhập đầy đủ thông tin!");
            if(pass.length < 6) return alert("Mật khẩu phải dài tối thiểu 6 ký tự!");

            let db = getLocalDB();
            if (db.users[user]) {
                alert("Tên tài khoản này đã có người đăng ký từ trước!");
            } else {
                db.users[user] = pass;
                localStorage.setItem("mood_diary_db", JSON.stringify(db));
                alert("🎉 Tạo tài khoản thành công! Hãy đăng nhập ngay.");
                switchPage('loginPage');
            }
        }

        // XỬ LÝ ĐĂNG NHẬP THẬT
        async function handleLoginSubmit(e) {
            e.preventDefault();
            const user = document.getElementById('loginUser').value.trim().toLowerCase();
            const pass = document.getElementById('loginPass').value;

            let db = getLocalDB();
            if (db.users[user] && db.users[user] === pass) {
                currentUser = user;
                localStorage.setItem("diary_user", user);
                document.getElementById('displayUsername').innerText = "@" + user;
                switchPage('dashboardPage');
                loadDiaries();
            } else {
                alert("❌ Sai tài khoản hoặc mật khẩu rồi bạn ơi!");
            }
        }

        // ĐĂNG BÀI NHẬT KÝ
        async function handleCabinetSubmit(e) {
            e.preventDefault();
            const title = document.getElementById('diaryTitle').value;
            const content = document.getElementById('diaryContent').value;
            const mood = document.getElementById('diaryMood').value;

            let db = getLocalDB();
            const newDiary = {
                id: Date.now(),
                title: title,
                content: content,
                mood: mood,
                author: currentUser,
                likes: 0
            };
            
            db.diaries.unshift(newDiary);
            localStorage.setItem("mood_diary_db", JSON.stringify(db));

            document.getElementById('diaryTitle').value = '';
            document.getElementById('diaryContent').value = '';
            loadDiaries();
        }

        // TẢI TOÀN BỘ BÀI VIẾT
        function loadDiaries() {
            const list = document.getElementById('diaryList');
            list.innerHTML = '';
            
            let db = getLocalDB();
            
            db.diaries.forEach(d => {
                let borderStyle = 'border-left: 6px solid #94a3b8;';
                if (d.mood.includes('🚀') || d.mood.includes('🙂')) borderStyle = 'border-left: 6px solid #10b981;';
                if (d.mood.includes('😢') || d.mood.includes('😡')) borderStyle = 'border-left: 6px solid #ef4444;';

                list.innerHTML += `
                    <div class="diary-card" style="${borderStyle}">
                        <div style="display: flex; justify-content: space-between; align-items: start;">
                            <div>
                                <h4 style="font-weight: 800; font-size: 1.25rem; color: #1e293b; margin: 0;">${d.title}</h4>
                                <p style="font-size: 0.8rem; color: #7c3aed; font-weight:700; margin: 0.25rem 0 0 0;">Viết bởi: @${d.author}</p>
                            </div>
                            <span style="background: #f3e8ff; color: #6b21a8; font-size: 0.8rem; padding: 0.35rem 0.85rem; border-radius: 9999px; font-weight: 700;">${d.mood}</span>
                        </div>
                        <p style="color: #475569; line-height: 1.6; margin: 1.25rem 0; white-space: pre-wrap; font-size: 0.975rem;">${d.content}</p>
                        <div style="margin-top: 1rem; padding-top: 0.75rem; border-top: 1px solid #f1f5f9;">
                            <button onclick="likePost(${d.id})" class="btn-like">
                                ❤️ Thích (${d.likes || 0})
                            </button>
                        </div>
                    </div>`;
            });
        }

        // THẢ TIM BÀI VIẾT
        function likePost(diaryId) {
            let db = getLocalDB();
            const index = db.diaries.findIndex(item => item.id === diaryId);
            if (index !== -1) {
                db.diaries[index].likes = (db.diaries[index].likes || 0) + 1;
                localStorage.setItem("mood_diary_db", JSON.stringify(db));
                loadDiaries();
            }
        }

        function handleLogout() {
            currentUser = null;
            localStorage.removeItem("diary_user");
            switchPage('loginPage');
        }
    </script>
</body>
</html>
