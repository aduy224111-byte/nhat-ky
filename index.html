<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔮 Nhật Ký Online - Bản Đồng Bộ Toàn Cầu</title>
    <link href="https://googleapis.com" rel="stylesheet">
    
    <style>
        :root {
            --primary: #7c3aed;
            --primary-light: #a78bfa;
            --secondary: #db2777;
            --bg-gradient: linear-gradient(135deg, #e0e7ff 0%, #f3e8ff 50%, #fce7f3 100%);
            --glass: rgba(255, 255, 255, 0.8);
            --border: rgba(255, 255, 255, 0.5);
        }

        .hidden { display: none !important; }
        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; transition: all 0.2s ease; }
        
        body {
            background: var(--bg-gradient) !important;
            margin: 0; padding: 0; min-height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .card-auth {
            background: var(--glass); backdrop-filter: blur(20px);
            padding: 3rem 2.5rem; border-radius: 2rem; width: 90%; max-width: 420px;
            box-shadow: 0 25px 60px -15px rgba(124, 58, 237, 0.15);
            border: 1px solid var(--border); text-align: center;
        }

        .title-gradient {
            font-size: 2.3rem; font-weight: 800;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 0.5rem 0;
        }

        .input-style {
            width: 100%; padding: 0.9rem 1.25rem; border: 2px solid #e2e8f0;
            border-radius: 1rem; margin-bottom: 1.25rem; outline: none; font-size: 1rem;
            background: rgba(255, 255, 255, 0.6); color: #1e293b; font-weight: 500;
        }
        .input-style:focus { border-color: var(--primary); background: #fff; box-shadow: 0 0 0 4px rgba(124, 58, 237, 0.1); }

        .btn-primary {
            width: 100%; padding: 1rem;
            background: linear-gradient(135deg, var(--primary) 0%, #4f46e5 100%);
            color: white; border: none; border-radius: 1rem; font-weight: 800; cursor: pointer;
            text-transform: uppercase; letter-spacing: 0.5px; box-shadow: 0 4px 12px rgba(124, 58, 237, 0.25);
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(124, 58, 237, 0.35); }

        .dashboard-container { width: 100%; min-height: 100vh; background: #f8fafc; display: flex; flex-direction: column; }
        
        nav {
            background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px);
            padding: 1.2rem 2.5rem; display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 30px rgba(0,0,0,0.02);
            border-bottom: 1px solid #e2e8f0;
        }

        .grid-layout {
            display: grid; grid-template-columns: 1fr; gap: 2rem;
            max-width: 1100px; width: 100%; margin: 2.5rem auto; padding: 0 1.25rem;
        }
        @media (min-width: 1024px) { .grid-layout { grid-template-columns: 2.8fr 1.2fr; } }

        .main-card { background: white; padding: 2rem; border-radius: 1.5rem; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.01); }
        
        .diary-card {
            background: white; padding: 1.75rem; border-radius: 1.5rem;
            border: 1px solid #e2e8f0; margin-bottom: 1.25rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.02);
        }
        .author-tag { font-weight: 800; color: var(--primary); cursor: pointer; font-size: 1.05rem; }
        .author-tag:hover { text-decoration: underline; color: var(--secondary); }

        .btn-action {
            background: #f1f5f9; color: #475569; border: none; padding: 0.6rem 1.2rem;
            border-radius: 0.75rem; font-weight: 700; cursor: pointer; font-size: 0.9rem;
        }
        .btn-action:hover { background: #e2e8f0; color: #1e293b; }

        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.3); backdrop-filter: blur(12px);
            display: flex; align-items: center; justify-content: center; z-index: 1000;
        }
        .modal-content {
            background: white; width: 90%; max-width: 650px; max-height: 85vh;
            border-radius: 2rem; padding: 2.5rem; overflow-y: auto; position: relative;
            box-shadow: 0 40px 80px rgba(15, 23, 42, 0.15);
            border: 1px solid #f1f5f9;
        }
        .close-btn { position: absolute; top: 1.5rem; right: 1.5rem; font-size: 1.5rem; cursor: pointer; border: none; background: none; color: #94a3b8; }
    </style>
</head>
<body>

    <!-- 🔑 GIAO DIỆN ĐĂNG NHẬP -->
    <div id="loginPage" style="width: 100%;">
        <div class="card-auth">
            <span style="font-size: 3.5rem; display: block; margin-bottom: 0.5rem;">🔮</span>
            <h2 class="title-gradient">Nhật Ký Online</h2>
            <p style="color: #6b7280; font-size: 0.95rem; margin-bottom: 2.5rem;">Hệ thống đồng bộ API toàn cầu mượt mà</p>
            <form onsubmit="handleLogin(event)">
                <input type="text" id="loginUser" required placeholder="Tên tài khoản..." class="input-style">
                <input type="password" id="loginPass" required placeholder="Mật khẩu của bạn..." class="input-style">
                <button type="submit" id="loginBtn" class="btn-primary">Đăng Nhập</button>
            </form>
            <p style="margin-top: 2rem; font-size: 0.9rem; color: #4b5563;">Chưa có tài khoản? <button onclick="switchPage('registerPage')" style="background:none; border:none; color:var(--primary); font-weight:700; cursor:pointer; text-decoration:underline;">Tạo tài khoản mới</button></p>
        </div>
    </div>

    <!-- 📝 GIAO DIỆN ĐĂNG KÝ -->
    <div id="registerPage" class="hidden" style="width: 100%;">
        <div class="card-auth">
            <span style="font-size: 3.5rem; display: block; margin-bottom: 0.5rem;">📝</span>
            <h2 class="title-gradient">Tạo Tài Khoản</h2>
            <p style="color: #6b7280; font-size: 0.95rem; margin-bottom: 2.5rem;">Đăng ký để đồng bộ dữ liệu ngay lập tức</p>
            <form onsubmit="handleRegister(event)">
                <input type="text" id="regUser" required placeholder="Tên tài khoản (Chữ liền không dấu)..." class="input-style">
                <input type="password" id="regPass" required placeholder="Mật khẩu từ 4 ký tự..." class="input-style">
                <button type="submit" id="regBtn" class="btn-primary">Đăng Ký Tài Khoản</button>
            </form>
            <p style="margin-top: 2rem; font-size: 0.9rem; color: #4b5563;">Đã có tài khoản rồi? <button onclick="switchPage('loginPage')" style="background:none; border:none; color:var(--primary); font-weight:700; cursor:pointer; text-decoration:underline;">Quay lại đăng nhập</button></p>
        </div>
    </div>

    <!-- 🔮 BẢNG ĐIỀU KHIỂN CHÍNH -->
    <div id="dashboardPage" class="hidden dashboard-container">
        <nav>
            <div style="display: flex; align-items: center; gap: 0.5rem; cursor:pointer;" onclick="location.reload()">
                <span style="font-size: 1.8rem;">🔮</span>
                <span style="font-weight: 900; font-size: 1.4rem; color: var(--primary);">NhậtKýOnline</span>
            </div>
            <div style="display: flex; gap: 1.25rem; align-items: center;">
                <p id="myProfileBtn" onclick="viewProfile(currentUser)" style="font-weight: 700; color: #1e293b; margin: 0; background: #f1f5f9; padding: 0.5rem 1.25rem; border-radius: 9999px; cursor: pointer; border: 1px solid #e2e8f0;">@user</p>
                <button onclick="handleLogout()" style="background: #fef2f2; color: #ef4444; border: 1px solid #fee2e2; padding: 0.5rem 1.25rem; border-radius: 0.75rem; font-weight:700; cursor:pointer;">Đăng Xuất</button>
            </div>
        </nav>

        <div class="grid-layout">
            <div>
                <div class="main-card" style="margin-bottom: 2rem;">
                    <h3 style="margin-top: 0; color: #1e293b; font-weight: 800;">Hôm nay bạn thế nào? ✨</h3>
                    <form onsubmit="handlePost(event)">
                        <textarea id="diaryContent" required placeholder="Ghi lại suy nghĩ của bạn để chia sẻ với mọi người..." class="input-style" style="height: 110px; resize: none; font-family: inherit; line-height: 1.5;"></textarea>
                        <button type="submit" class="btn-primary" style="width: auto; padding: 0.7rem 2.5rem; float: right;">Đăng Bài Viết</button>
                        <div style="clear: both;"></div>
                    </form>
                </div>

                <h3 style="color: #475569; margin-left: 0.25rem; font-weight: 800; font-size: 1.2rem; margin-bottom: 1rem;">📖 Nhật ký chung từ mọi người</h3>
                <div id="allDiariesFeed"></div>
            </div>

            <div>
                <div class="main-card">
                    <h3 style="margin-top: 0; border-bottom: 2px solid #f1f5f9; padding-bottom: 0.75rem; font-weight: 800; color: #1e293b;">🌐 Khám phá bạn bè</h3>
                    <div id="allUsersList"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- 👤 MODAL XEM TRANG CÁ NHÂN -->
    <div id="profileModal" class="modal hidden">
        <div class="modal-content">
            <button class="close-btn" onclick="closeProfile()">✕</button>
            <div style="text-align: center; margin-bottom: 2rem; border-bottom: 2px solid #f1f5f9; padding-bottom: 1.5rem;">
                <div style="font-size: 4.5rem; margin-bottom: 0.5rem;">👤</div>
                <h2 id="profileName" style="margin: 0; color: var(--primary); font-weight: 800;">@username</h2>
                <p id="profileStatus" style="color: #64748b; font-weight: 600; font-size: 0.95rem; margin: 0.35rem 0 0 0;"></p>
            </div>
            <h3 id="profileFeedTitle" style="color: #1e293b; margin-bottom: 1.25rem; font-weight: 800;">📝 Dòng thời gian:</h3>
            <div id="profileDiariesList"></div>
        </div>
    </div>

    <!-- ================= LOGIC ĐƯỢC LÀM LẠI HOÀN TOÀN BẰNG REST API ================= -->
    <script>
        // Đường dẫn API trực tiếp trỏ vào Realtime Database của Duy
        const baseUrl = "https://firebasedatabase.app";
        
        let currentUser = localStorage.getItem('online_diary_user') || null;
        let updateInterval;

        window.onload = function() {
            if (currentUser) { showDashboard(); } else { switchPage('loginPage'); }
        };

        function switchPage(id) {
            document.getElementById('loginPage').classList.add('hidden');
            document.getElementById('registerPage').classList.add('hidden');
            document.getElementById('dashboardPage').classList.add('hidden');
            document.getElementById(id).classList.remove('hidden');
            
            if(id === 'dashboardPage') {
                document.body.style.alignItems = 'stretch'; document.body.style.justifyContent = 'flex-start';
            } else {
                document.body.style.alignItems = 'center'; document.body.style.justifyContent = 'center';
            }
        }

        // ĐĂNG KÝ QUA FETCH API - Bỏ qua hoàn toàn cơ chế chặn của trình duyệt
        async function handleRegister(e) {
            e.preventDefault();
            const btn = document.getElementById('regBtn');
            const user = document.getElementById('regUser').value.trim().toLowerCase().replace(/[^a-zA-Z0-9_]/g, '');
            const pass = document.getElementById('regPass').value;

            if(user.length < 3 || pass.length < 4) { alert('Tên tài khoản tối thiểu 3 ký tự, mật khẩu từ 4 ký tự!'); return; }

            btn.disabled = true; btn.innerText = "Đang kết nối Cloud...";

            try {
                // Kiểm tra tài khoản đã tồn tại chưa bằng phương thức GET nhận dữ liệu JSON nhanh
                const response = await fetch(`${baseUrl}/users/${user}.json`);
                const existingUser = await response.json();

                if (existingUser) {
                    alert('Tên tài khoản này đã tồn tại trên hệ thống Cloud!');
                    btn.disabled = false; btn.innerText = "Đăng Ký Tài Khoản";
                    return;
                }

                // Ghi tài khoản mới lên hệ thống bằng phương thức PUT truyền dữ liệu JSON trực tiếp
                const registerResponse = await fetch(`${baseUrl}/users/${user}.json`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: pass, username: user })
                });

                if (registerResponse.ok) {
                    alert('🎉 Tạo tài khoản đồng bộ toàn cầu thành công! Hãy đăng nhập ngay.');
                    document.getElementById('regUser').value = '';
                    document.getElementById('regPass').value = '';
                    switchPage('loginPage');
                } else {
                    alert('Lỗi phân quyền Firebase! Đảm bảo bạn đã chọn "Chế độ thử nghiệm" trong tab Rules.');
                }
            } catch (error) {
                alert('Không thể kết nối máy chủ Cloud! Hãy kiểm tra lại kết nối mạng.');
            } finally {
                btn.disabled = false; btn.innerText = "Đăng Ký Tài Khoản";
            }
        }

        // ĐĂNG NHẬP QUA FETCH API
        async function handleLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const user = document.getElementById('loginUser').value.trim().toLowerCase();
            const pass = document.getElementById('loginPass').value;

            btn.disabled = true; btn.innerText = "Đang xác thực...";

            try {
                const response = await fetch(`${baseUrl}/users/${user}.json`);
                const userData = await response.json();

                if (userData && userData.password === pass) {
                    currentUser = user;
                    localStorage.setItem('online_diary_user', currentUser);
                    showDashboard();
                } else {
                    alert('❌ Sai tên tài khoản hoặc mật khẩu hệ thống!');
                }
            } catch (error) {
                alert('Lỗi kết nối API! Không thể xác thực dữ liệu.');
            } finally {
                btn.disabled = false; btn.innerText = "Đăng Nhập";
            }
        }

        function showDashboard() {
            switchPage('dashboardPage');
            document.getElementById('myProfileBtn').innerText = `@${currentUser}`;
            
            // Tải dữ liệu ban đầu
            fetchData();
            
            // Tự động làm mới, cập nhật bảng tin và danh sách bạn bè sau mỗi 4 giây
            if (updateInterval) clearInterval(updateInterval);
            updateInterval = setInterval(fetchData, 4000);
        }

        function handleLogout() {
            currentUser = null;
            localStorage.removeItem('online_diary_user');
            if (updateInterval) clearInterval(updateInterval);
            switchPage('loginPage');
        }

        // ĐĂNG NHẬT KÝ MỚI LÊN MẠNG QUA PHƯƠNG THỨC POST
        async function handlePost(e) {
            e.preventDefault();
            const text = document.getElementById('diaryContent').value.trim();
            if(!text) return;

            try {
                await fetch(`${baseUrl}/diaries.json`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        author: currentUser,
                        content: text,
                        timestamp: Date.now()
                    })
                });
                document.getElementById('diaryContent').value = '';
                fetchData(); // Cập nhật ngay bảng tin sau khi đăng thành công
            } catch (error) {
                alert("Lỗi khi đăng bài lên Cloud!");
            }
        }

        // HÀM LẤY TOÀN BỘ DỮ LIỆU ĐỒNG BỘ TỪ MẠNG VỀ
        async function fetchData() {
            try {
                // Lấy luồng bài viết nhật ký
                const diariesRes = await fetch(`${baseUrl}/diaries.json`);
                const diariesData = await diariesRes.json();
                renderAllDiaries(diariesData);

                // Lấy danh sách thành viên kết bạn
                const usersRes = await fetch(`${baseUrl}/users.json`);
                const usersData = await usersRes.json();
                renderUsersList(usersData);
            } catch (err) {
                console.log("Cập nhật dữ liệu nền gặp lỗi mạng.");
            }
        }

        function renderAllDiaries(data) {
            const feed = document.getElementById('allDiariesFeed');
            feed.innerHTML = '';
            if(!data) { feed.innerHTML = '<p style="text-align:center;color:#94a3b8;padding:2.5rem;">Mọi người chưa viết bài nhật ký trực tuyến nào.</p>'; return; }

            const list = Object.values(data).sort((a,b) => b.timestamp - a.timestamp);
            list.forEach(item => {
                const card = document.createElement('div');
                card.className = 'diary-card';
                card.innerHTML = `
                    <div style="display:flex; justify-content:space-between; margin-bottom:0.75rem; align-items:center;">
                        <span class="author-tag" onclick="viewProfile('${item.author}')">@${item.author} ${item.author === currentUser ? '(Bạn)' : ''}</span>
                        <span style="font-size:0.8rem; color:#94a3b8; font-weight:600;">${new Date(item.timestamp).toLocaleDateString('vi-VN')}</span>
                    </div>
                    <p style="color:#334155; line-height:1.6; margin:0 0 1rem 0; white-space:pre-wrap;">${item.content}</p>
                    <button class="btn-action" onclick="alert('Tính năng tương tác Like đang đồng bộ nâng cấp!')">❤️ Thích</button>
                `;
                feed.appendChild(card);
            });
        }

        function renderUsersList(users) {
            const container = document.getElementById('allUsersList');
            container.innerHTML = '';
            if(!users) return;

            Object.keys(users).forEach(username => {
                const div = document.createElement('div');
                div.style = 'display:flex; justify-content:space-between; align-items:center; padding:0.75rem 0; border-bottom:1px dashed #e2e8f0;';
                div.innerHTML = `
                    <span style="font-weight:700; color:#475569; cursor:pointer;" class="author-tag" onclick="viewProfile('${username}')">@${username}</span>
                    ${username !== currentUser ? `<button class="btn-action" style="background:#eff6ff; color:#2563eb; font-size:0.8rem; padding:0.4rem 0.8rem;" onclick="alert('Đã gửi lời mời kết bạn!')">+ Kết bạn</button>` : `<span style="font-size:0.8rem; color:#94a3b8; font-weight:700;">Bạn</span>`}
                `;
                container.appendChild(div);
            });
        }

        // XEM TƯỜNG TRANG CÁ NHÂN QUA ĐỒNG BỘ API
        async function viewProfile(username) {
            document.getElementById('profileName').innerText = `@${username}`;
            if(username === currentUser) {
                document.getElementById('profileStatus').innerText = "✨ Không gian nhật ký cá nhân của bạn";
                document.getElementById('profileFeedTitle').innerText = "📝 Tất cả các bài viết bạn đã đăng:";
            } else {
                document.getElementById('profileStatus').innerText = `👋 Ghé thăm trang nhật ký cá nhân của @${username}`;
                document.getElementById('profileFeedTitle').innerText = `📝 Các bài nhật ký của @${username}:`;
            }

            const container = document.getElementById('profileDiariesList');
            container.innerHTML = '<p style="color:#94a3b8;text-align:center;">Đang đồng bộ dữ liệu dòng thời gian...</p>';
            document.getElementById('profileModal').classList.remove('hidden');

            try {
                const res = await fetch(`${baseUrl}/diaries.json`);
                const diaries = await res.json();
                container.innerHTML = '';

                if(!diaries) { container.innerHTML = '<p style="color:#94a3b8;">Người này chưa viết bài nhật ký nào.</p>'; return; }

                const userPosts = Object.values(diaries)
                                        .filter(post => post.author === username)
                                        .sort((a,b) => b.timestamp - a.timestamp);

                if(userPosts.length === 0) {
                    container.innerHTML = '<p style="color:#94a3b8;">Chưa đăng câu chuyện nào.</p>';
                } else {
                    userPosts.forEach(post => {
                        const div = document.createElement('div');
                        div.style = 'background:#f8fafc; border:1px solid #e2e8f0; padding:1.25rem; border-radius:1.25rem; margin-bottom:0.85rem;';
                        div.innerHTML = `
                            <p style="font-size:0.8rem; color:#94a3b8; margin:0 0 0.5rem 0; font-weight:600;">Đăng ngày: ${new Date(post.timestamp).toLocaleDateString('vi-VN')} lúc ${new Date(post.timestamp).toLocaleTimeString('vi-VN', {hour: '2-digit', minute:'2-digit'})}</p>
                            <p style="margin:0; color:#334155; white-space:pre-wrap; line-height:1.5;">${post.content}</p>
                        `;
                        container.appendChild(div);
                    });
                }
            } catch (error) {
                container.innerHTML = '<p style="color:#ef4444;">Lỗi khi đồng bộ dòng thời gian.</p>';
            }
        }

        function closeProfile() { document.getElementById('profileModal').classList.add('hidden'); }
    </script>
</body>
</html>
