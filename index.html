<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔮 MoodDiary - Mạng Xã Hội Nhật Ký & Kết Bạn</title>
    <link href="https://googleapis.com" rel="stylesheet">
    
    <style>
        .hidden { display: none !important; }
        
        body {
            background: linear-gradient(135deg, #e0e7ff 0%, #f3e8ff 50%, #fce7f3 100%) !important;
            background-color: #f3e8ff !important;
            font-family: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
        }

        .card-auth {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 3rem 2.5rem;
            border-radius: 2rem;
            width: 90%;
            max-w: 420px;
            margin: auto;
            box-shadow: 0 25px 60px -15px rgba(124, 58, 237, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.7);
            text-align: center;
            box-sizing: border-box;
        }

        .title-gradient {
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(to right, #7c3aed, #db2777);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0.5rem 0;
        }

        .label-style {
            display: block;
            font-weight: 700;
            font-size: 0.85rem;
            color: #4b5563;
            margin-bottom: 0.5rem;
            text-align: left;
            text-transform: uppercase;
        }

        .input-style {
            width: 100%;
            padding: 0.9rem 1.25rem;
            border: 2px solid #e2e8f0;
            border-radius: 1rem;
            margin-bottom: 1.5rem;
            box-sizing: border-box;
            outline: none;
            font-size: 1rem;
            background-color: #f8fafc;
        }

        .btn-primary {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #7c3aed 0%, #4f46e5 100%) !important;
            color: white !important;
            border: none;
            border-radius: 1rem;
            font-weight: 800;
            cursor: pointer;
            text-transform: uppercase;
        }

        .text-link {
            color: #7c3aed;
            font-weight: 700;
            background: none;
            border: none;
            cursor: pointer;
            text-decoration: underline;
        }

        .dashboard-container {
            width: 100%;
            min-height: 100vh;
            background-color: #f8fafc;
            display: flex;
            flex-direction: column;
        }

        nav {
            background: white;
            padding: 1.25rem 2.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.03);
        }

        .grid-layout {
            display: grid;
            grid-template-columns: 1fr;
            gap: 2rem;
            max-width: 1100px;
            width: 100%;
            margin: 2.5rem auto;
            padding: 0 1.25rem;
            box-sizing: border-box;
        }

        @media (min-width: 1024px) {
            .grid-layout {
                grid-template-columns: 3fr 1.2fr;
            }
        }

        .form-diary, .sidebar-card {
            background: white;
            padding: 2rem;
            border-radius: 1.5rem;
            border: 1px solid #e2e8f0;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.01);
        }

        .diary-card {
            background: white;
            padding: 1.75rem;
            border-radius: 1.5rem;
            border: 1px solid #e2e8f0;
            margin-bottom: 1.25rem;
        }

        .btn-like, .btn-friend {
            background: #fff5f5;
            color: #f43f5e;
            border: 1px solid #ffe4e6;
            padding: 0.6rem 1.25rem;
            border-radius: 0.75rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-friend {
            background: #eff6ff;
            color: #2563eb;
            border: 1px solid #dbeafe;
            padding: 0.4rem 0.8rem;
            font-size: 0.85rem;
        }

        .tab-btn {
            padding: 0.5rem 1rem;
            font-weight: 700;
            border-radius: 0.5rem;
            cursor: pointer;
            border: none;
            background: #e2e8f0;
            color: #4b5563;
        }

        .tab-active {
            background: #7c3aed;
            color: white;
        }
    </style>
</head>
<body>

    <!-- 🔑 GIAO DIỆN ĐĂNG NHẬP -->
    <div id="loginPage" style="width: 100%;">
        <div class="card-auth">
            <div style="margin-bottom: 2.5rem;">
                <span style="font-size: 3.5rem; display: block;">🔮</span>
                <h2 class="title-gradient">MoodDiary</h2>
                <p style="color: #6b7280; font-size: 0.95rem;">Đăng nhập tài khoản mạng xã hội nhật ký</p>
            </div>
            <form id="loginForm">
                <label class="label-style">Tên tài khoản</label>
                <input type="text" id="loginUser" required placeholder="Nhập tên tài khoản..." class="input-style">
                <label class="label-style">Mật khẩu</label>
                <input type="password" id="loginPass" required placeholder="••••••••" class="input-style">
                <button type="submit" class="btn-primary">Đăng Nhập Ngay</button>
            </form>
            <p style="margin-top: 2rem; font-size: 0.9rem; color: #4b5563;">Chưa có tài khoản? <button onclick="switchPage('registerPage')" class="text-link">Đăng ký tài khoản mới</button></p>
        </div>
    </div>

    <!-- 📝 GIAO DIỆN ĐĂNG KÝ -->
    <div id="registerPage" class="hidden" style="width: 100%;">
        <div class="card-auth">
            <div style="margin-bottom: 2.5rem;">
                <span style="font-size: 3.5rem; display: block;">📝</span>
                <h2 class="title-gradient">Tạo Tài Khoản</h2>
                <p style="color: #6b7280; font-size: 0.95rem;">Đăng ký để kết nối cảm xúc cùng mọi người</p>
            </div>
            <form id="registerForm">
                <label class="label-style">Tên tài khoản mới</label>
                <input type="text" id="regUser" required placeholder="Nhập tên viết liền không dấu..." class="input-style">
                <label class="label-style">Mật khẩu bảo mật</label>
                <input type="password" id="regPass" required placeholder="Tối thiểu 6 ký tự..." class="input-style">
                <button type="submit" class="btn-primary">Đăng Ký Tài Khoản</button>
            </form>
            <p style="margin-top: 2rem; font-size: 0.9rem; color: #4b5563;">Đã có tài khoản? <button onclick="switchPage('loginPage')" class="text-link">Quay lại đăng nhập</button></p>
        </div>
    </div>

    <!-- 🔮 BẢNG ĐIỀU KHIỂN CHÍNH -->
    <div id="dashboardPage" class="hidden dashboard-container">
        <nav>
            <div style="display: flex; align-items: center; gap: 0.5rem;"><span style="font-size: 1.75rem;">🔮</span><span style="font-weight: 900; font-size: 1.4rem; color: #7c3aed;">MoodDiary</span></div>
            <div style="display: flex; gap: 1.25rem; align-items: center;">
                <p id="displayUsername" style="font-weight: 700; color: #1e293b; margin: 0; background: #f1f5f9; padding: 0.5rem 1rem; border-radius: 9999px;">@user</p>
                <button id="logoutBtn" style="background: #fef2f2; color: #ef4444; border: none; padding: 0.6rem 1.25rem; border-radius: 0.75rem; font-weight: 700; cursor: pointer;">Đăng xuất</button>
            </div>
        </nav>

        <div class="grid-layout">
            <div>
                <div class="form-diary">
                    <h3 style="margin-top: 0; font-size: 1.3rem; font-weight: 800; color: #1e293b; margin-bottom: 1.25rem;">✍️ Hôm nay tâm trạng của bạn thế nào?</h3>
                    <form id="diaryForm" style="display: flex; flex-direction: column; gap: 1.25rem;">
                        <input type="text" id="diaryTitle" placeholder="Tiêu đề câu chuyện ngày hôm nay..." required style="padding: 0.85rem 1rem; border: 2px solid #e2e8f0; border-radius: 0.75rem; outline: none; font-size: 1rem;">
                        <textarea id="diaryContent" rows="4" placeholder="Hãy lan tỏa câu chuyện hoặc trút bỏ tâm sự..." required style="padding: 0.85rem 1rem; border: 2px solid #e2e8f0; border-radius: 0.75rem; outline: none; resize: vertical; font-family: inherit; font-size: 1rem;"></textarea>
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <select id="diaryMood" style="padding: 0.6rem 1rem; border-radius: 0.75rem; border: 2px solid #e2e8f0; background: #f8fafc; font-weight: 600;">
                                <option>🚀 Tuyệt vời</option><option>🙂 Vui vẻ</option><option>😐 Bình thường</option><option>😢 Buồn bã</option><option>😡 Bực bội</option>
                            </select>
                            <button type="submit" class="tab-active" style="padding: 0.85rem 2rem; border: none; border-radius: 0.75rem; font-weight: 800; color: white; cursor: pointer;">Chia Sẻ Bài Viết</button>
                        </div>
                    </form>
                </div>

                <div style="display: flex; gap: 0.5rem; margin-bottom: 1.25rem;">
                    <button id="tabAll" class="tab-btn tab-active">🌐 Toàn xã hội</button>
                    <button id="tabFriends" class="tab-btn">👥 Chỉ bạn bè</button>
                </div>

                <div id="diaryList" style="display: flex; flex-direction: column; gap: 1rem;"></div>
            </div>

            <div class="sidebar-card" style="height: fit-content;">
                <h3 style="margin-top: 0; font-size: 1.15rem; font-weight: 800; color: #1e293b; margin-bottom: 0.5rem;">👥 Tìm kiếm & Bạn bè</h3>
                <input type="text" id="searchUser" placeholder="Gõ tên tìm bạn bè..." style="width: 100%; padding: 0.5rem 0.75rem; border: 2px solid #e2e8f0; border-radius: 0.5rem; outline: none; margin-bottom: 1rem; font-size: 0.9rem;">
                <div id="userList" style="display: flex; flex-direction: column; gap: 0.75rem; max-height: 400px; overflow-y: auto;"></div>
            </div>
        </div>
    </div>

    <!-- ⚡ HỆ THỐNG ĐỒNG BỘ ENGINE HỖ TRỢ XỬ LÝ QUYỀN TRUY CẬP -->
    <script type="module">
        import { initializeApp } from "https://gstatic.com";
        import { getDatabase, ref, set, get, child, update, push, onValue } from "https://gstatic.com";

        const firebaseConfig = {
            apiKey: "AIzaSyAOcavYOsOGgRnmfPKeojppLoP6hPYe6pI",
            authDomain: "://firebaseapp.com",
            databaseURL: "https://firebasedatabase.app",
            projectId: "shopcuttay",
            storageBucket: "shopcuttay.firebasestorage.app",
            messagingSenderId: "275809822981",
            appId: "1:275809822981:web:02e33ad2515eed78b32f6c"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let currentUser = localStorage.getItem("diary_user") || null;
        let currentTab = "all";

        window.switchPage = function(pageId) {
            document.getElementById('loginPage').style.display = pageId === 'loginPage' ? 'flex' : 'none';
            document.getElementById('registerPage').style.display = pageId === 'registerPage' ? 'flex' : 'none';
            document.getElementById('dashboardPage').style.display = pageId === 'dashboardPage' ? 'block' : 'none';
            if (pageId === 'dashboardPage') {
                document.body.style.justifyContent = 'flex-start';
            } else {
                document.body.style.justifyContent = 'center';
            }
        }

        if (currentUser) {
            document.getElementById('displayUsername').innerText = "@" + currentUser;
            switchPage('dashboardPage');
            startListening();
        } else {
            switchPage('loginPage');
        }

        // ĐĂNG KÝ TÀI KHOẢN (Bổ sung bẫy bắt lỗi bảo mật Firebase)
        document.getElementById('registerForm').onsubmit = async function(e) {
            e.preventDefault();
            const user = document.getElementById('regUser').value.trim().toLowerCase();
            const pass = document.getElementById('regPass').value;

            if(!user || !pass) return alert("Vui lòng điền đủ thông tin!");
            if(user.includes(' ') || user.length < 3) return alert("Tên viết liền không dấu, từ 3 ký tự!");

            try {
                const snapshot = await get(child(ref(db), `users/${user}`));
                if (snapshot.exists()) {
                    alert("Tên tài khoản này đã tồn tại!");
                } else {
                    await set(ref(db, `users/${user}`), { password: pass });
                    alert("🎉 Tạo tài khoản mạng xã hội thành công!");
                    switchPage('loginPage');
                }
            } catch (error) {
                console.error(error);
                alert("❌ Lỗi phân quyền Firebase! Bạn phải vào trang Firebase Console -> Realtime Database -> Tab Rules -> Sửa thành \".read\": true, \".write\": true mới lưu được nick nhé!");
            }
        };

        // ĐĂNG NHẬP XÁC THỰC
        document.getElementById('loginForm').onsubmit = async function(e) {
            e.preventDefault();
            const user = document.getElementById('loginUser').value.trim().toLowerCase();
            const pass = document.getElementById('loginPass').value;

            try {
                const snapshot = await get(child(ref(db), `users/${user}`));
                if (snapshot.exists() && snapshot.val().password === pass) {
                    currentUser = user;
                    localStorage.setItem("diary_user", user);
                    document.getElementById('displayUsername').innerText = "@" + user;
                    switchPage('dashboardPage');
                    startListening();
                } else {
                    alert("❌ Sai tài khoản hoặc mật khẩu!");
                }
            } catch (error) {
                alert("Không thể kết nối đến máy chủ Firebase của bạn, vui lòng mở khóa Rules.");
            }
        };

        // ĐĂNG BÀI NHẬT KÝ
        document.getElementById('diaryForm').onsubmit = async function(e) {
            e.preventDefault();
            const title = document.getElementById('diaryTitle').value.trim();
            const content = document.getElementById('diaryContent').value.trim();
            const mood = document.getElementById('diaryMood').value;

            try {
                const newDiaryRef = push(ref(db, 'diaries'));
                await set(newDiaryRef, {
                    id: newDiaryRef.key,
                    title: title,
                    content: content,
                    mood: mood,
                    author: currentUser,
                    likes: 0
                });
                document.getElementById('diaryTitle').value = '';
                document.getElementById('diaryContent').value = '';
            } catch (error) {
                alert("Lỗi phân quyền không thể đăng bài viết!");
            }
        };

        function startListening() {
            onValue(ref(db), (snapshot) => {
                const data = snapshot.val() || {};
                const users = data.users || {};
                const diaries = data.diaries || {};
                const friends = data.friends || {};

                renderDiaries(diaries, friends);
                renderUsers(users, friends);
            }, (error) => {
                console.log("Firebase Rules đang khóa luồng đọc data.");
            });
        }

        function renderDiaries(diariesObj, friendsObj) {
            const list = document.getElementById('diaryList');
            list.innerHTML = '';

            const diariesArray = Object.values(diariesObj).reverse();
            let myFriends = friendsObj[currentUser] ? Object.keys(friendsObj[currentUser]) : [];

            let count = 0;
            diariesArray.forEach(d => {
                if (currentTab === "friends" && d.author !== currentUser && !myFriends.includes(d.author)) {
                    return;
                }

                count++;
                let borderStyle = 'border-left: 6px solid #94a3b8;';
                if (d.mood.includes('🚀') || d.mood.includes('🙂')) borderStyle = 'border-left: 6px solid #10b981;';
                if (d.mood.includes('😢') || d.mood.includes('😡')) borderStyle = 'border-left: 6px solid #ef4444;';

                list.innerHTML += `
                    <div class="diary-card" style="${borderStyle}">
                        <div style="display: flex; justify-content: space-between; align-items: start;">
                            <div>
                                <h4 style="font-weight: 800; font-size: 1.25rem; color: #1e293b; margin: 0;">${d.title}</h4>
                                <p style="font-size: 0.8rem; color: #7c3aed; font-weight:700; margin: 0.25rem 0 0 0;">Viết bởi: @${d.author} ${myFriends.includes(d.author) ? '👉 (Bạn bè 👥)' : ''}</p>
                            </div>
                            <span style="background: #f3e8ff; color: #6b21a8; font-size: 0.8rem; padding: 0.35rem 0.85rem; border-radius: 9999px; font-weight: 700;">${d.mood}</span>
                        </div>
                        <p style="color: #475569; line-height: 1.6; margin: 1.25rem 0; white-space: pre-wrap; font-size: 0.975rem;">${d.content}</p>
                        <div style="margin-top: 1rem; padding-top: 0.75rem; border-top: 1px solid #f1f5f9;">
                            <button onclick="window.likePost('${d.id}', ${d.likes || 0})" class="btn-like">
                                ❤️ Thích (${d.likes || 0})
                            </button>
                        </div>
                    </div>`;
            });

            if (count === 0 && currentTab === "friends") {
                list.innerHTML = '<p style="color: #64748b; text-align: center; font-style: italic; padding: 2rem; background: white; border-radius: 1rem;">👥 Bạn bè chưa đăng bài viết nào!</p>';
            }
        }

        function renderUsers(usersObj, friendsObj) {
            const container = document.getElementById('userList');
            const keyword = document.getElementById('searchUser').value.trim().toLowerCase();
            container.innerHTML = '';

            let myFriends = friendsObj[currentUser] ? Object.keys(friendsObj[currentUser]) : [];
            let hasUser = false;

            Object.keys(usersObj).forEach(user => {
                if (user === currentUser) return;
                if (keyword && !user.includes(keyword)) return;

                hasUser = true;
                let isFriend = myFriends.includes(user);
                let btnText = isFriend ? "🤝 Bạn bè" : "+ Kết bạn";
                let btnStyle = isFriend ? "background: #e2e8f0; color: #64748b; border-color:#cbd5e1;" : "";

                container.innerHTML += `
                    <div style="display: flex; justify-content: space-between; align-items: center; padding: 0.5rem 0; border-bottom: 1px dashed #f1f5f9;">
                        <span style="font-weight: 600; font-size: 0.95rem; color: #334155;">@${user}</span>
                        <button onclick="window.toggleFriend('${user}', ${isFriend})" class="btn-friend" style="${btnStyle}">${btnText}</button>
                    </div>`;
            });

            if (!hasUser) {
                container.innerHTML = '<p style="color: #94a3b8; font-style: italic; font-size: 0.85rem; text-align: center;">Không tìm thấy ai!</p>';
            }
        }

        window.likePost = async function(diaryId, currentLikes) {
            const updates = {};
            updates[`/diaries/${diaryId}/likes`] = currentLikes + 1;
            await update(ref(db), updates);
        };

        window.toggleFriend = async function(targetUser, isFriend) {
            if (isFriend) {
                await set(ref(db, `friends/${currentUser}/${targetUser}`), null);
                await set(ref(db, `friends/${targetUser}/${currentUser}`), null);
            } else {
                await set(ref(db, `friends/${currentUser}/${targetUser}`), true);
                await set(ref(db, `friends/${targetUser}/${currentUser}`), true);
            }
        };

        window.switchTimeline = function(tab) {
            currentTab = tab;
            document.getElementById('tabAll').className = "tab-btn " + (tab === 'all' ? 'tab-active' : '');
            document.getElementById('tabFriends').className = "tab-btn " + (tab === 'friends' ? 'tab-active' : '');
            get(ref(db)).then((snapshot) => {
                const data = snapshot.val() || {};
                renderDiaries(data.diaries || {}, data.friends || {});
            });
        }

        document.getElementById('tabAll').onclick = () => window.switchTimeline('all');
        document.getElementById('tabFriends').onclick = () => window.switchTimeline('friends');
        document.getElementById('searchUser').oninput = () => {
            get(ref(db)).then((snapshot) => {
                const data = snapshot.val() || {};
                renderUsers(data.users || {}, data.friends || {});
            });
        };

        document.getElementById('logoutBtn').onclick = function() {
            currentUser = null;
            localStorage.removeItem("diary_user");
            switchPage('loginPage');
        };
    </script>
</body>
</html>
