<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoodDiary - Mạng Xã Hội Nhật Ký</title>
    <!-- Nhúng thư viện Tailwind CSS tạo giao diện Pastel sang xịn mịn -->
    <script src="https://tailwindcss.com"></script>
    <style>
        .hidden { display: none !important; }
    </style>
</head>
<body class="bg-gradient-to-br from-indigo-100 via-purple-50 to-pink-100 min-h-screen text-gray-800">

    <!-- 🔑 GIAO DIỆN ĐĂNG NHẬP THẬT -->
    <div id="loginPage" class="flex items-center justify-center min-h-screen p-4">
        <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md border border-purple-100">
            <div class="text-center mb-8">
                <span class="text-4xl">🔑</span>
                <h2 class="text-3xl font-extrabold text-gray-800 mt-2">Chào Quay Trở Lại</h2>
                <p class="text-gray-500 text-sm mt-1">Đăng nhập tài khoản mạng xã hội nhật ký</p>
            </div>
            <form onsubmit="handleLogin(event)" class="space-y-5">
                <input type="text" id="loginUser" required placeholder="Tên tài khoản..." class="w-full px-4 py-2.5 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-purple-400">
                <input type="password" id="loginPass" required placeholder="Mật khẩu..." class="w-full px-4 py-2.5 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-purple-400">
                <button type="submit" class="w-full bg-gradient-to-r from-purple-600 to-indigo-600 text-white py-3 rounded-xl font-bold hover:opacity-90 transition-all cursor-pointer">Đăng Nhập</button>
            </form>
            <p class="text-sm text-center text-gray-600 mt-6">Chưa có tài khoản? <button onclick="switchPage('registerPage')" class="text-purple-600 font-bold hover:underline cursor-pointer">Đăng ký mới</button></p>
        </div>
    </div>

    <!-- 📝 GIAO DIỆN ĐĂNG KÝ THẬT -->
    <div id="registerPage" class="hidden flex items-center justify-center min-h-screen p-4">
        <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md border border-purple-100">
            <div class="text-center mb-8">
                <span class="text-4xl">📝</span>
                <h2 class="text-3xl font-extrabold text-gray-800 mt-2">Tạo Tài Khoản Thật</h2>
                <p class="text-gray-500 text-sm mt-1">Đăng ký để kết nối cùng mọi người</p>
            </div>
            <form onsubmit="handleRegister(event)" class="space-y-5">
                <input type="text" id="regUser" required placeholder="Tên tài khoản mới..." class="w-full px-4 py-2.5 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-purple-400">
                <input type="password" id="regPass" required placeholder="Mật khẩu bảo mật..." class="w-full px-4 py-2.5 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-purple-400">
                <button type="submit" class="w-full bg-gradient-to-r from-purple-600 to-indigo-600 text-white py-3 rounded-xl font-bold hover:opacity-90 transition-all cursor-pointer">Đăng Ký Tài Khoản</button>
            </form>
            <p class="text-sm text-center text-gray-600 mt-6">Đã có tài khoản? <button onclick="switchPage('loginPage')" class="text-purple-600 font-bold hover:underline cursor-pointer">Đăng nhập</button></p>
        </div>
    </div>

    <!-- 🔮 BẢNG ĐIỀU KHIỂN CHÍNH -->
    <div id="dashboardPage" class="hidden bg-slate-50 min-h-screen">
        <nav class="sticky top-0 z-50 bg-white shadow-sm border-b border-gray-100 px-6 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-2"><span class="text-2xl">🔮</span><span class="text-xl font-black text-purple-600">MoodDiary</span></div>
            <div class="flex items-center space-x-4">
                <p class="text-sm font-bold text-gray-800" id="displayUsername">@user</p>
                <button onclick="handleLogout()" class="bg-red-50 text-red-600 px-4 py-2 rounded-xl text-sm font-bold hover:bg-red-100 cursor-pointer">Đăng xuất</button>
            </div>
        </nav>

        <main class="max-w-4xl mx-auto mt-8 px-4 pb-12">
            <!-- Form Viết Bài -->
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 mb-8">
                <h3 class="text-lg font-bold text-gray-800 mb-4">✍️ Hôm nay tâm trạng của bạn thế nào?</h3>
                <form onsubmit="handleCabinetSubmit(event)" class="space-y-4">
                    <input type="text" id="diaryTitle" placeholder="Tiêu đề ngày hôm nay..." required class="w-full p-3 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-purple-400">
                    <textarea id="diaryContent" rows="4" placeholder="Hãy viết ra những chia sẻ của bạn vào đây..." required class="w-full p-3 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-purple-400"></textarea>
                    <div class="flex items-center justify-between pt-2">
                        <select id="diaryMood" class="p-2 border border-gray-200 rounded-xl bg-gray-50 font-medium text-sm">
                            <option>🚀 Tuyệt vời</option><option>🙂 Vui vẻ</option><option>😐 Bình thường</option><option>😢 Buồn bã</option><option>😡 Bực bội</option>
                        </select>
                        <button type="submit" class="bg-purple-600 text-white px-6 py-2.5 rounded-xl font-bold hover:bg-purple-700 cursor-pointer">Chia Sẻ Lên Cộng Đồng</button>
                    </div>
                </form>
            </div>

            <!-- Bảng Tin Nhật Ký Chung -->
            <div class="space-y-4">
                <h3 class="text-xl font-extrabold text-gray-800 flex items-center space-x-2">🌐 Bảng tin cộng đồng (Mọi người cùng xem chéo)</h3>
                <div id="diaryList" class="space-y-4"></div>
            </div>
        </main>
    </div>

    <!-- ⚡ KẾT NỐI DATABASE TRỰC TUYẾN MIỄN PHÍ TRÊN TRÌNH DUYỆT -->
    <script type="module">
        import { initializeApp } from "https://gstatic.com";
        import { getDatabase, ref, set, get, child, update, push } from "https://gstatic.com";

        // Cấu hình Database đám mây kết nối server miễn phí công cộng
        const firebaseConfig = {
            databaseURL: "https://firebasedatabase.app"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Biến toàn cục lưu tên user hiện tại
        let currentUser = localStorage.getItem("diary_user") || null;

        window.switchPage = function(pageId) {
            document.getElementById('loginPage').style.display = pageId === 'loginPage' ? 'flex' : 'none';
            document.getElementById('registerPage').style.display = pageId === 'registerPage' ? 'flex' : 'none';
            document.getElementById('dashboardPage').style.display = pageId === 'dashboardPage' ? 'block' : 'none';
        }

        // Tự động kiểm tra trạng thái khi F5 trang
        function initApp() {
            if (currentUser) {
                document.getElementById('displayUsername').innerText = "@" + currentUser;
                switchPage('dashboardPage');
                loadDiaries();
            } else {
                switchPage('loginPage');
            }
        }
        initApp();

        // ĐĂNG KÝ TÀI KHOẢN THẬT (Lưu trực tiếp lên server đám mây)
        window.handleRegister = async function(e) {
            e.preventDefault();
            const user = document.getElementById('regUser').value.trim().toLowerCase();
            const pass = document.getElementById('regPass').value;

            if(!user || !pass) return alert("Vui lòng điền đủ thông tin!");

            const dbRef = ref(db);
            const snapshot = await get(child(dbRef, `users/${user}`));
            
            if (snapshot.exists()) {
                alert("Tên tài khoản này đã có người đăng ký rồi!");
            } else {
                await set(ref(db, `users/${user}`), { password: pass });
                alert("Đăng ký tài khoản thật thành công! Hãy đăng nhập.");
                switchPage('loginPage');
            }
        }

        // ĐĂNG NHẬP KIỂM TRA MẬT KHẨU THẬT
        window.handleLogin = async function(e) {
            e.preventDefault();
            const user = document.getElementById('loginUser').value.trim().toLowerCase();
            const pass = document.getElementById('loginPass').value;

            const dbRef = ref(db);
            const snapshot = await get(child(dbRef, `users/${user}`));

            if (snapshot.exists() && snapshot.val().password === pass) {
                currentUser = user;
                localStorage.setItem("diary_user", user); // Nhớ trạng thái để F5 không bị văng
                document.getElementById('displayUsername').innerText = "@" + user;
                switchPage('dashboardPage');
                loadDiaries();
            } else {
                alert("Sai tài khoản hoặc mật khẩu thật!");
            }
        }

        // LƯU BÀI VIẾT LÊN SERVER CHUNG CHO MỌI NGƯỜI CÙNG THẤY
        window.handleCabinetSubmit = async function(e) {
            e.preventDefault();
            const title = document.getElementById('diaryTitle').value;
            const content = document.getElementById('diaryContent').value;
            const mood = document.getElementById('diaryMood').value;

            const diaryRef = ref(db, 'diaries');
            const newDiaryRef = push(diaryRef);
            
            await set(newDiaryRef, {
                id: newDiaryRef.key,
                title: title,
                content: content,
                mood: mood,
                author: currentUser,
                likes: 0
            });

            document.getElementById('diaryTitle').value = '';
            document.getElementById('diaryContent').value = '';
            loadDiaries();
        }

        // TẢI BÀI VIẾT CỦA TẤT CẢ MỌI NGƯỜI THỜI GIAN THỰC
        window.loadDiaries = async function() {
            const list = document.getElementById('diaryList');
            list.innerHTML = '';
            
            const dbRef = ref(db);
            const snapshot = await get(child(dbRef, 'diaries'));
            
            if (!snapshot.exists()) {
                list.innerHTML = '<p class="text-gray-500 italic text-center py-4">Chưa có bài viết nào trên hệ thống. Hãy đăng bài đầu tiên!</p>';
                return;
            }

            const data = snapshot.val();
            // Đảo ngược danh sách để bài mới nhất lên đầu
            const sortedDiaries = Object.values(data).reverse();

            sortedDiaries.forEach(d => {
                let border = 'border-l-gray-400';
                if (d.mood.includes('🚀') || d.mood.includes('🙂')) border = 'border-l-green-500';
                if (d.mood.includes('😢') || d.mood.includes('😡')) border = 'border-l-red-500';

                list.innerHTML += `
                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 border-l-4 ${border}">
                        <div class="flex justify-between items-start mb-2">
                            <div>
                                <h4 class="font-bold text-xl text-gray-800">${d.title}</h4>
                                <p class="text-xs text-purple-600 mt-0.5">Viết bởi: <b>@${d.author}</b></p>
                            </div>
                            <span class="bg-purple-50 text-purple-700 text-xs px-3 py-1.5 rounded-full font-bold">${d.mood}</span>
                        </div>
                        <p class="text-gray-600 leading-relaxed whitespace-pre-wrap">${d.content}</p>
                        <div class="mt-4 pt-3 border-t border-gray-50 flex justify-between items-center">
                            <button onclick="likePost('${d.id}', ${d.likes || 0})" class="bg-pink-50 text-pink-600 text-sm font-bold px-4 py-2 rounded-xl hover:bg-pink-100 transition cursor-pointer">
                                ❤️ Thích (${d.likes || 0})
                            </button>
                        </div>
                    </div>`;
            });
        }

        // TÍNH NĂNG THẢ TIM TĂNG SỐ LIÊN THÔNG TOÀN MẠNG
        window.likePost = async function(diaryId, currentLikes) {
            if (!currentUser) return alert("Vui lòng đăng nhập!");
            
            const updates = {};
            updates[`/diaries/${diaryId}/likes`] = currentLikes + 1;
            
            await update(ref(db), updates);
            loadDiaries(); // Cập nhật lại số lượt thích ngay lập tức
        }

        window.handleLogout = function() {
            currentUser = null;
            localStorage.removeItem("diary_user");
            switchPage('loginPage');
        }
    </script>
</body>
</html>
